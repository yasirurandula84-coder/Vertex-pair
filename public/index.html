<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTEX-MD SESSION GENERATOR</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #1e293b; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: center; width: 350px; }
        h2 { color: #38bdf8; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; outline: none; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #38bdf8; border: none; border-radius: 8px; color: #0f172a; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #0ea5e9; }
        #code-display { margin-top: 20px; padding: 15px; background: #334155; border-radius: 8px; display: none; font-size: 24px; font-weight: bold; letter-spacing: 5px; color: #fbbf24; border: 2px dashed #fbbf24; }
        .loading { font-size: 14px; color: #94a3b8; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>VORTEX-MD</h2>
        <p>Enter your number with country code</p>
        <input type="text" id="number" placeholder="947xxxxxxxx">
        <button onclick="getPairingCode()">GET PAIRING CODE</button>
        <div id="loading" class="loading" style="display: none;">Generating code... Please wait...</div>
        <div id="code-display"></div>
    </div>

    <script>
        async function getPairingCode() {
            const num = document.getElementById('number').value;
            if (!num) return alert("Please enter your number!");
            
            document.getElementById('loading').style.display = 'block';
            document.getElementById('code-display').style.display = 'none';

            try {
                const response = await fetch(`/pair?num=${num}`);
                const data = await response.json();
                if (data.code) {
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('code-display').innerText = data.code;
                    document.getElementById('code-display').style.display = 'block';
                }
            } catch (err) {
                alert("Something went wrong. Try again!");
                document.getElementById('loading').style.display = 'none';
            }
        }
    </script>
</body>
</html>
